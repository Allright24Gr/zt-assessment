#    environment:
#      SHUFFLE_DEFAULT_USERNAME: ${SHUFFLE_ADMIN_USER:-admin}
#      SHUFFLE_DEFAULT_PASSWORD: ${SHUFFLE_ADMIN_PASSWORD:-shuffleadmin}
#      SHUFFLE_DEFAULT_APIKEY: ${SHUFFLE_API_KEY}
#      SHUFFLE_APP_HOTLOAD_FOLDER: /shuffle-apps
#      SHUFFLE_FILE_LOCATION: /shuffle-files
#    ports:
#      - "3000:3000"
#    volumes:
#      - shuffle-apps:/shuffle-apps
#      - shuffle-files:/shuffle-files
#    networks:
#      - zt-network

  nmap-wrapper:
    build:
      context: ./nmap-wrapper
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    networks:
      - zt-network

  trivy-wrapper:
    build:
      context: ./trivy-wrapper
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    networks:
      - zt-network

networks:
  zt-network:
    driver: bridge

volumes:
  mysql-data:
  wazuh-data:
  elasticsearch-data:
  shuffle-apps:
  shuffle-files:
