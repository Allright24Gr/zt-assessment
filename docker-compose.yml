services:
  zt-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "8080:80"
    networks:
      - zt-network
    depends_on:
      - zt-backend

  zt-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SELF_BASE_URL=http://zt-backend:8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080}
    networks:
      - zt-network
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - zt-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --http-port=8443
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8443:8443"
    networks:
      - zt-network

  wazuh:
    image: wazuh/wazuh-manager:4.7.0
    environment:
      WAZUH_API_USER: ${WAZUH_USER}
      WAZUH_API_PASSWORD: ${WAZUH_PASSWORD}
    ports:
      - "55000:55000"
    volumes:
      - wazuh-data:/var/ossec/data
    networks:
      - zt-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9201:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - zt-network

  # ── Shuffle SOAR ───────────────────────────────────────────────────────────
  # 기본 `docker compose up`에는 포함되지 않음 (profiles).
  # Shuffle 워크플로우 연동이 필요하면:  docker compose --profile shuffle up -d
  shuffle-backend:
    image: ghcr.io/shuffle/shuffle-backend:latest
    container_name: shuffle-backend
    restart: unless-stopped
    profiles: ["shuffle"]
    depends_on:
      - shuffle-database
    environment:
      - DATASTORE_EMULATOR_HOST=shuffle-database:8000
      - SHUFFLE_APP_HOTLOAD_FOLDER=/shuffle-apps
      - SHUFFLE_FILE_LOCATION=/shuffle-files
      - ORG_ID=Shuffle
      - SHUFFLE_OPENSEARCH_INDEX_PREFIX=shuffle
    volumes:
      - shuffle-apps:/shuffle-apps
      - shuffle-files:/shuffle-files
    ports:
      - "5001:5001"
    networks:
      - zt-network

  shuffle-frontend:
    image: ghcr.io/shuffle/shuffle-frontend:latest
    container_name: shuffle-frontend
    restart: unless-stopped
    profiles: ["shuffle"]
    depends_on:
      - shuffle-backend
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
    ports:
      - "3001:80"
    networks:
      - zt-network

  shuffle-database:
    image: opensearchproject/opensearch:2.11.0
    container_name: shuffle-database
    restart: unless-stopped
    profiles: ["shuffle"]
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
    volumes:
      - shuffle-database:/usr/share/opensearch/data
    networks:
      - zt-network

  nmap-wrapper:
    build:
      context: ./nmap-wrapper
      dockerfile: Dockerfile
    ports:
      - "8001:5000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - zt-network

  trivy-wrapper:
    build:
      context: ./trivy-wrapper
      dockerfile: Dockerfile
    ports:
      - "8002:5001"
    volumes:
      - trivy-cache:/root/.cache/trivy
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TRIVY_NO_PROGRESS=true
    networks:
      - zt-network

networks:
  zt-network:
    driver: bridge

volumes:
  mysql-data:
  wazuh-data:
  elasticsearch-data:
  shuffle-apps:
  shuffle-files:
  shuffle-database:
  trivy-cache:
