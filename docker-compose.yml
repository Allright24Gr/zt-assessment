services:
  zt-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "8080:80"
    networks:
      - zt-network
    depends_on:
      - zt-backend

  zt-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # .env 는 선택사항 — 없으면 아래 기본값으로 그대로 동작한다(무설정 제출본 실행 대응).
    # .env 를 두면 그 값이 우선한다.
    env_file:
      - path: .env
        required: false
    environment:
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-zt_assessment}
      - DB_USER=${DB_USER:-zt_user}
      - DB_PASSWORD=${DB_PASSWORD:-ztDemo1234}
      - SECRET_KEY=${SECRET_KEY:-zt-demo-secret-key-change-me-in-production-0123456789}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080}
      - NMAP_WRAPPER_URL=${NMAP_WRAPPER_URL:-http://nmap-wrapper:8001}
      - TRIVY_WRAPPER_URL=${TRIVY_WRAPPER_URL:-http://trivy-wrapper:8002}
    networks:
      - zt-network
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ztRoot1234}
      MYSQL_DATABASE: ${DB_NAME:-zt_assessment}
      MYSQL_USER: ${DB_USER:-zt_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ztDemo1234}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - zt-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --http-port=8443
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8443:8443"
    networks:
      - zt-network

  wazuh:
    image: wazuh/wazuh-manager:4.7.0
    environment:
      WAZUH_API_USER: ${WAZUH_USER:-wazuh-wui}
      WAZUH_API_PASSWORD: ${WAZUH_PASSWORD:-wazuhDemo1234}
    ports:
      - "55000:55000"
    volumes:
      - wazuh-data:/var/ossec/data
    networks:
      - zt-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9201:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - zt-network

  nmap-wrapper:
    build:
      context: ./nmap-wrapper
      dockerfile: Dockerfile
    ports:
      - "8001:5000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - zt-network

  trivy-wrapper:
    build:
      context: ./trivy-wrapper
      dockerfile: Dockerfile
    ports:
      - "8002:5001"
    volumes:
      - trivy-cache:/root/.cache/trivy
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TRIVY_NO_PROGRESS=true
    networks:
      - zt-network

networks:
  zt-network:
    driver: bridge

volumes:
  mysql-data:
  wazuh-data:
  elasticsearch-data:
  trivy-cache:
