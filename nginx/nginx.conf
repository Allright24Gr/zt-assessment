# Readyz-T Production Nginx Reverse Proxy
#
# 진입점:
#   80  → 443 redirect
#   443 → /api/* (백엔드), 그 외 (프론트엔드 정적 파일)
#
# 인증서:
#   ./nginx/certs/fullchain.pem + privkey.pem
#   - Let's Encrypt 권장 (certbot --webroot 또는 standalone)
#   - 초기 검증용 self-signed:
#       openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
#         -keyout nginx/certs/privkey.pem -out nginx/certs/fullchain.pem \
#         -subj "/CN=localhost"
#
# 로그: /var/log/nginx/{access,error}.log (호스트로 마운트)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    log_format zt_json escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log zt_json;
    error_log  /var/log/nginx/error.log warn;

    # 업로드 한도: 증적 파일 PDF/이미지 10MB + 약간의 여유
    client_max_body_size 15m;

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;
    gzip_min_length 1024;

    # ── 80 포트: HTTPS 강제 리다이렉트 ─────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── 443 포트: 본 진입점 ───────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # 보안 헤더
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # 백엔드 API
        location /api/ {
            proxy_pass http://zt-backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 진단 처리 시간이 길 수 있어서 타임아웃 여유
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # 헬스체크 (외부 모니터링 도구용)
        location = /health {
            proxy_pass http://zt-backend:8000/health;
            access_log off;
        }

        # 프론트엔드 정적 파일
        location / {
            proxy_pass http://zt-web:80;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
