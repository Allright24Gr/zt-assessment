<!DOCTYPE html>
<html lang="ko">
<body style="margin:0;padding:24px;background:#f4f6fa;font-family:'Helvetica Neue',Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#1f2937;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:560px;margin:0 auto;background:#ffffff;border-radius:8px;overflow:hidden;">
    <tr>
      <td style="padding:24px 28px;background:#047857;color:#ffffff;font-size:18px;font-weight:600;">
        제로트러스트 진단 완료
      </td>
    </tr>
    <tr>
      <td style="padding:28px;font-size:14px;line-height:1.7;">
        <p style="margin:0 0 12px;"><strong>{{ user_name }}</strong> 님,</p>
        <p style="margin:0 0 16px;"><strong>{{ org_name }}</strong> 조직의 제로트러스트 성숙도 진단이 완료되었습니다.</p>
        <table cellpadding="0" cellspacing="0" style="width:100%;margin:8px 0 20px;border-collapse:collapse;font-size:13px;">
          <tr>
            <td style="padding:8px 12px;background:#f3f4f6;width:120px;color:#374151;">세션 ID</td>
            <td style="padding:8px 12px;background:#ffffff;border-bottom:1px solid #e5e7eb;">{{ session_id }}</td>
          </tr>
          <tr>
            <td style="padding:8px 12px;background:#f3f4f6;color:#374151;">총점</td>
            <td style="padding:8px 12px;background:#ffffff;border-bottom:1px solid #e5e7eb;"><strong>{{ score }}</strong></td>
          </tr>
          <tr>
            <td style="padding:8px 12px;background:#f3f4f6;color:#374151;">성숙도 등급</td>
            <td style="padding:8px 12px;background:#ffffff;"><strong style="color:#047857;">{{ level }}</strong></td>
          </tr>
        </table>
        <p style="margin:0 0 16px;text-align:center;">
          <a href="{{ result_url }}" style="display:inline-block;padding:12px 24px;background:#047857;color:#ffffff;text-decoration:none;border-radius:6px;font-weight:600;">결과 확인</a>
        </p>
        <p style="margin:0;font-size:11px;color:#6b7280;word-break:break-all;">{{ result_url }}</p>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 28px;background:#f9fafb;color:#6b7280;font-size:11px;">
        본 메일은 발신 전용입니다. — Readyz-T 진단팀
      </td>
    </tr>
  </table>
</body>
</html>
