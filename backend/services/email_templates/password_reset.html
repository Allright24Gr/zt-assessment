<!DOCTYPE html>
<html lang="ko">
<body style="margin:0;padding:24px;background:#f4f6fa;font-family:'Helvetica Neue',Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:#1f2937;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:560px;margin:0 auto;background:#ffffff;border-radius:8px;overflow:hidden;">
    <tr>
      <td style="padding:24px 28px;background:#1d4ed8;color:#ffffff;font-size:18px;font-weight:600;">
        Readyz-T 비밀번호 재설정
      </td>
    </tr>
    <tr>
      <td style="padding:28px;font-size:14px;line-height:1.7;">
        <p style="margin:0 0 12px;"><strong>{{ user_name }}</strong> 님, 안녕하세요.</p>
        <p style="margin:0 0 16px;">비밀번호 재설정 요청을 접수했습니다. 아래 버튼을 1시간 이내에 클릭하여 새 비밀번호를 설정해주세요.</p>
        <p style="margin:24px 0;text-align:center;">
          <a href="{{ reset_url }}" style="display:inline-block;padding:12px 24px;background:#1d4ed8;color:#ffffff;text-decoration:none;border-radius:6px;font-weight:600;">비밀번호 재설정</a>
        </p>
        <p style="margin:0 0 8px;font-size:12px;color:#6b7280;">버튼이 동작하지 않을 경우 다음 URL을 복사해 주소창에 붙여넣으세요.</p>
        <p style="margin:0 0 16px;word-break:break-all;font-size:12px;color:#374151;">{{ reset_url }}</p>
        <p style="margin:0 0 8px;font-size:12px;color:#6b7280;">링크 만료: {{ expires_at }}</p>
        <p style="margin:16px 0 0;font-size:12px;color:#6b7280;">본인이 요청하지 않았다면 이 메일을 무시하셔도 됩니다. 계정 비밀번호는 변경되지 않습니다.</p>
      </td>
    </tr>
    <tr>
      <td style="padding:16px 28px;background:#f9fafb;color:#6b7280;font-size:11px;">
        — Readyz-T 보안팀
      </td>
    </tr>
  </table>
</body>
</html>
