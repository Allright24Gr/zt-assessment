server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html은 캐시 금지 (배포 후 즉시 새 번들 받게)
  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
    expires 0;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
